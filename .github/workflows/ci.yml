name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------
  # Private content guard: ensure no banned symbols leak out
  # ---------------------------------------------------------
  private-content-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for banned symbols
        run: |
          BANNED="qubitdyne bosonsampling ATS_analytics"
          FAILED=0
          for sym in $BANNED; do
            if grep -r "$sym" src/ notebooks/ --include="*.py" --include="*.ipynb" -l 2>/dev/null | grep -q .; then
              echo "ERROR: banned symbol '$sym' found in public files:"
              grep -r "$sym" src/ notebooks/ --include="*.py" --include="*.ipynb" -l
              FAILED=1
            fi
          done
          exit $FAILED

  # ---------------------------------------------------------
  # Unit tests for the library
  # ---------------------------------------------------------
  unit-tests:
    runs-on: ubuntu-latest
    needs: private-content-guard
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install qutip numpy scipy matplotlib
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  # ---------------------------------------------------------
  # Notebook smoke tests (fast notebooks only)
  # ---------------------------------------------------------
  notebook-smoke:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install qutip numpy scipy matplotlib ipywidgets ipykernel
          pip install -e ".[dev]"
          python -m ipykernel install --user --name bosonic-gates

      - name: Run notebook smoke tests (module0 only on PRs)
        run: |
          pytest --nbmake notebooks/module0_foundations/ \
            --nbmake-timeout=300 \
            --ignore-glob="**/module5*" \
            --ignore-glob="**/module6*"
        env:
          BINDER_FAST: "1"
