name: bosonic-gates
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy>=1.24
  - scipy>=1.10
  - matplotlib>=3.7
  - ipywidgets>=8.0
  - jupyterlab>=4.0
  - ipympl
  - sympy
  - pytest
  - pip
  - pip:
      - qutip>=5.0
      - qutip-jax
      - jax
      - optax
      - pytest-nbmake
      - nbmake
      - -e .
